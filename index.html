<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Docs over SSH</title>

    <style>
      :root {
        --bg: #020617;
        --card: #020617;
        --border: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: var(--text);
      }

      .container {
        max-width: 900px;
        margin: auto;
        padding: 40px 20px;
      }

      /* HERO */
      .hero {
        text-align: center;
        margin-bottom: 60px;
      }

      .hero h1 {
        font-size: 42px;
        margin-bottom: 16px;
        letter-spacing: -1px;
      }

      .hero p {
        color: var(--muted);
        font-size: 18px;
        margin-bottom: 30px;
      }

      .hero code {
        display: inline-block;
        background: #000;
        border: 1px solid var(--border);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 16px;
        color: var(--accent);
      }

      /* GRID */
      .grid {
        display: grid;
        gap: 20px;
      }

      /* CARD */
      .card {
        background: rgba(2, 6, 23, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        transition: all 0.2s ease;
      }

      .card:hover {
        border-color: #334155;
        transform: translateY(-2px);
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .card p {
        margin: 0 0 14px;
        color: var(--muted);
      }

      .terminal {
        background: #000;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-family: monospace;
        color: var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .terminal span {
        overflow-x: auto;
      }

      button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
      }

      a:hover {
        text-decoration: underline;
      }

      /* FOOTER */
      .footer {
        margin-top: 60px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .footer a {
        margin-left: 6px;
      }
    </style>
  </head>

  <body>

    <div class="container">

      <!-- HERO -->
      <div class="hero">
        <h1>Docs over SSH</h1>
        <p>Explore documentation you can access directly from your terminal.</p>

        <code>ssh supabase.com</code>
      </div>

      <!-- LIST -->
      <div class="grid">

        <!-- CARD -->
        <div class="card">
          <h2>Supabase Docs</h2>
          <p>Interactive documentation experience directly over SSH.</p>

          <div class="terminal">
            <span id="cmd1">ssh supabase.com</span>
            <button onclick="copy('cmd1')">Copy</button>
          </div>

          <div style="margin-top: 10px;">
            <a href="https://supabase.com/blog/supabase-docs-over-ssh" target="_blank">
              Learn more →
            </a>
          </div>
        </div>

        <!-- ADD MORE CARDS HERE -->

      </div>

      <!-- FOOTER -->
      <div class="footer">
        <p>
          Want to add a project?
          <a href="https://github.com/dnstld/docs-over-ssh/issues" target="_blank">
            Submit it here
          </a>
        </p>
      </div>

    </div>

    <script>
      function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
      }
    </script>
  </body>
</html>
