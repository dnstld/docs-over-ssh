<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docs over SSH</title>

  <style>
    :root {
      --bg: #020617;
      --border: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --card: rgba(2, 6, 23, 0.85);
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: var(--text);
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1, h2, h3 {
      letter-spacing: -0.5px;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    /* HEADER */
    .header {
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 42px;
      margin: 0 0 8px;
    }

    /* TERMINAL */
    .terminal {
      background: black;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      max-width: 520px;
      margin: 18px 0 30px;
      font-family: monospace;
      color: var(--accent);
    }

    .terminal-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .red { background: #ef4444; }
    .yellow { background: #facc15; }
    .green { background: #22c55e; }

    /* CARD */
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: var(--card);
      margin-bottom: 14px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(15, 23, 42, 0.5);
    }

    .cmd {
      margin-top: 6px;
      font-family: monospace;
      color: var(--accent);
    }

    .links {
      display: flex;
      gap: 14px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* FOOTER */
    .footer {
      margin-top: 60px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Docs over SSH</h1>
    <p>A registry of documentation systems accessible over SSH.</p>

    <!-- TERMINAL -->
    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      ssh supabase.sh
    </div>

  </div>

  <!-- ENTRY -->
  <div class="card">

    <div class="card-top">
      <h3 style="margin:0;">Supabase</h3>

      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <span class="tag">AI</span>
        <span class="tag">docs</span>
        <span class="tag">terminal</span>
      </div>
    </div>

    <div class="cmd">ssh supabase.sh</div>

    <p>
      Documentation exposed as a filesystem over SSH for terminal-native access.
    </p>

    <div class="links">
      <a href="https://supabase.com/blog/supabase-docs-over-ssh" target="_blank">Blog →</a>
      <a href="https://github.com/supabase-community/supabase-ssh" target="_blank">GitHub →</a>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    A curated index of SSH-accessible documentation endpoints.
  </div>

</div>

</body>
</html>
